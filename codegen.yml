overwrite: true
schema: 'https://cms-matteo.barques.dev/graphql' # Your GraphQL API URL from environment variables
documents: 'src/Graphql/wordpressCMS/**/*.ts' # This points to where your GraphQL queries/mutations are located
generates:
    src/graphql/generated.tsx: # The output file for the generated types
        plugins:
            - 'typescript'
            - 'typescript-operations'
            - 'typescript-react-apollo'
        config:
            withHooks: true # This generates React Apollo hooks like `useQuery` and `useMutation`
            withComponent: false
            withHOC: false
    ./graphql.schema.json:
        plugins:
            - 'introspection'
